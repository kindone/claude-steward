# OpenCode Steward — Docker Compose (multi-CLI experiment branch)
#
# Successor to the original cline experiment. Targets opencode (Go binary,
# lightweight per-invocation startup) as the primary alternative CLI to
# Claude Code. Coexists with the host's steward via container/volume
# isolation and ports 23001/23003.
#
# ── CLI selection ─────────────────────────────────────────────────────────────
# Set STEWARD_CLI in the host shell or .env to pick the active adapter:
#   STEWARD_CLI=claude   # default — Anthropic claude CLI
#   STEWARD_CLI=opencode # opencode CLI
# The container ships both binaries; selection is per-session at runtime via
# the CliAdapter abstraction in server/src/cli/.
#
# ── Prerequisites on the host ─────────────────────────────────────────────────
# Required env vars in .env (gitignored):
#   STEWARD_TEST_OAUTH_TOKEN=<long-lived Claude token from `claude setup-token`>
#   GEMINI_API_KEY=<from https://aistudio.google.com/apikey>   # for opencode
# Optional:
#   ANTHROPIC_API_KEY=<key>            # opencode can also target Anthropic
#   API_KEY=<secret>                   # optional; UI "Sign in with API key" (see environment below)
#   OPENCODE_APP_DOMAIN=<subdomain>    # WebAuthn rpID
#
# mdart must exist at the path referenced by additional_contexts below.
#
# ── Usage ─────────────────────────────────────────────────────────────────────
#   docker compose up --build          # first run / source changes
#   docker compose up                  # cached
#   docker compose down -v             # stop + wipe volume

services:
  steward:
    build:
      context: .
      dockerfile: Dockerfile
      # Default runtime stage: minimal image, no source / dev deps / git.
      # Override files (docker-compose.evolve.yml, docker-compose.shared.yml)
      # flip this to `runtime-evolve`. Without an explicit target compose
      # builds the *last* Dockerfile stage (= evolve), which we don't want as
      # the default — minimal is smaller and faster for smoke tests.
      target: runtime-minimal
      additional_contexts:
        # Set MDART_DIR to the absolute path of your mdart package checkout
        # (e.g. in your shell or .env). The default below is a placeholder
        # and will fail with "no such directory" until overridden.
        mdart: "${MDART_DIR:-/path/to/mdart/packages/mdart}"
    container_name: opencode-steward
    restart: unless-stopped

    ports:
      - "23001:3001"   # main HTTP API + static files
      - "23003:3003"   # safe-mode fallback

    volumes:
      # ── steward-managed (vendor-neutral) ────────────────────────────────
      # These hold steward's own state, independent of which CLI adapter
      # is active. Named without a CLI prefix so they make sense after the
      # opencode branch merges into main.

      # Steward SQLite DB (sessions, messages, projects, artifacts, …).
      - steward-data:/data

      # Artifact files (chart JSON, report markdown, code, html, …) live
      # at /app/artifacts/<id>-<slug>.<ext>; DB rows in steward-data point
      # at this path. Without the mount, rebuilds wipe the files but leave
      # the rows — UI shows the artifact but "Failed to get artifact
      # content" on open.
      - steward-artifacts:/app/artifacts

      # MCP runtime data: the notify secret (stable across restarts so
      # in-flight MCP child processes spawned before a steward-main
      # `pm2 restart` keep authenticating) and the regenerated-on-startup
      # steward-mcp.json. Lives at /app/server/data/, otherwise wiped on
      # every rebuild.
      - steward-mcp:/app/server/data

      # User-created notebook cells + outputs. notebooks.ts writes per-cell
      # files under /app/notebooks/<name>/cells/ and outputs/.
      - steward-notebooks:/app/notebooks

      # Files uploaded via the projects upload route land in /app/uploads/.
      - steward-uploads:/app/uploads

      # ── opencode-CLI-specific ───────────────────────────────────────────
      # opencode persists per-conversation state in /root/.local/share/
      # opencode/ (sessions, snapshots, its own SQLite). Without this
      # volume, every rebuild gives the container a fresh writable layer
      # and wipes opencode's session store, leaving steward's DB with
      # stale `ses_xxx` pointers that opencode can't resolve ("Session
      # not found"). The cache + state dirs are persisted for parity.
      - opencode-state:/root/.local/share/opencode
      - opencode-cache:/root/.cache/opencode
      - opencode-runtime-state:/root/.local/state/opencode

      # Optional: mount a .env for APP_DOMAIN / VAPID_*, etc.
      # - ./docker/.env.container:/app/.env:ro

    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/steward.db
      # Override via OPENCODE_APP_DOMAIN env var (in your shell or .env).
      - APP_DOMAIN=${OPENCODE_APP_DOMAIN:-your-host.example.com}
      # API_KEY: set this to log in via "Sign in directly" (no passkey needed for test).
      # Use a secret value; omit or leave empty to disable key-based login.
      - API_KEY=${API_KEY:-}

      # Adapter selection — see server/src/cli/index.ts
      - STEWARD_CLI=${STEWARD_CLI:-opencode}

      # Claude CLI: still installed in the image as a fallback / for parity tests.
      # OAuth token is independent of host's rotating credentials — same Anthropic
      # account but a separate non-rotating grant, safe for containers.
      - CLAUDE_PATH=/usr/local/bin/claude
      - CLAUDE_CODE_OAUTH_TOKEN=${STEWARD_TEST_OAUTH_TOKEN:-}

      # opencode CLI: provider keys passed through. opencode reads either env or
      # ~/.local/share/opencode/auth.json; entrypoint will reconcile if needed.
      # Note: opencode's `auth list` detects GEMINI_API_KEY, but the underlying
      # AI-SDK Google provider call requires GOOGLE_GENERATIVE_AI_API_KEY. We
      # populate both from the host's single GEMINI_API_KEY var so users only
      # have to set one thing in .env.
      - OPENCODE_PATH=/usr/local/bin/opencode
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Default model when a session doesn't pick one (opencode: provider/model).
      # `google/gemma-4-31b-it` = Gemma 4 31B on the same Gemini API key. Override in .env if needed.
      - OPENCODE_DEFAULT_MODEL=${OPENCODE_DEFAULT_MODEL:-google/gemma-4-31b-it}

    # Defense in depth: cap container resource usage so a runaway agent
    # process can't take the host down (lesson from the cline 09:14 lockup).
    deploy:
      resources:
        limits:
          memory: 1500M
          cpus: '1.5'

    # Healthcheck uses node (always present in the runtime image) instead of
    # curl/wget which aren't installed in node:23-slim. Pre-fix this was
    # logging a curl-not-found error every 10s for 800+ rounds.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/api/meta').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  # Steward-managed (vendor-neutral) — see service `volumes:` above.
  steward-data:
    driver: local
  steward-artifacts:
    driver: local
  steward-mcp:
    driver: local
  steward-notebooks:
    driver: local
  steward-uploads:
    driver: local
  # opencode CLI-specific.
  opencode-state:
    driver: local
  opencode-cache:
    driver: local
  opencode-runtime-state:
    driver: local
