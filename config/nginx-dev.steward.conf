# dev.steward.jradoo.com — Vite dev server (:5173)
# Use when running npm run up:dev. Copy to /etc/nginx/sites-available/ and run certbot.
# Requires: include ws-map in http block (see docs/self-management.md).

server {
    server_name dev.steward.jradoo.com;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;

        # WebSocket (Vite HMR)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
    }

    listen 80;
}

# After copying and enabling, run:
#   sudo certbot --nginx -d dev.steward.jradoo.com
# Certbot will add listen 443 ssl and the HTTP→HTTPS redirect.
