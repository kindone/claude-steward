# test.steward.jradoo.com — Docker test container
# Proxies to the claude-steward Docker container on port 13001.
# SSL managed by Certbot.
#
# Install:
#   sudo cp docker/nginx-test.conf /etc/nginx/sites-available/steward-test
#   sudo ln -s /etc/nginx/sites-available/steward-test /etc/nginx/sites-enabled/steward-test
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d test.steward.jradoo.com

server {
    server_name test.steward.jradoo.com;

    location / {
        proxy_pass http://127.0.0.1:13001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # SSE: disable buffering so streaming responses reach the browser immediately
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
        client_max_body_size 55m;
    }

    listen 80;
}
