# your-host.example.com — opencode-steward (Docker: host 23001 → container 3001)
# SSL: Certbot.
#
# Replace `your-host.example.com` below with your actual hostname before installing.
# DNS: point your-host.example.com A/AAAA to this host.
#
# Install:
#   sudo cp docker/nginx-test.conf /etc/nginx/sites-available/steward-opencode-test
#   sudo ln -sf /etc/nginx/sites-available/steward-opencode-test /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-host.example.com

server {
    server_name your-host.example.com;

    location / {
        proxy_pass http://127.0.0.1:23001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # SSE: disable buffering so streaming responses reach the browser immediately
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
        client_max_body_size 55m;
    }

    listen 80;
}
