# Claude Steward — Docker Compose
#
# Prerequisites on the host:
#   1. Generate a long-lived OAuth token (independent of your host's rotating
#      credentials in ~/.claude/.credentials.json — same Claude account is
#      fine). Run against a scratch config dir so ~/.claude/ isn't touched:
#
#        CLAUDE_CONFIG_DIR=$HOME/.claude-test claude setup-token
#        # browser opens → sign in → CLI prints a long-lived token
#
#   2. Store the token in a root-level .env file (gitignored):
#        echo 'STEWARD_TEST_OAUTH_TOKEN=<paste-token-here>' >> .env
#        echo 'STEWARD_API_KEY=<some-secret>'               >> .env   # optional
#
#   3. (Optional) Mount a .env for APP_DOMAIN / VAPID keys inside the container:
#        cp .env docker/.env.container   # then uncomment the volume line below
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up                  # subsequent runs (cached image)
#   docker compose down -v             # stop + wipe ephemeral DB

services:
  steward:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        mdart: "${MDART_DIR:-/home/ubuntu/mdart/packages/mdart}"
    container_name: claude-steward
    restart: unless-stopped

    ports:
      - "13001:3001"   # main HTTP API + static files → nginx test.steward.jradoo.com
      - "13003:3003"   # safe-mode fallback

    volumes:
      # SQLite database — named volume so it persists across container restarts
      - steward-data:/data

      # Optional: mount a .env for APP_DOMAIN, VAPID_*, etc.
      # - ./docker/.env.container:/app/.env:ro

    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/steward.db
      - APP_DOMAIN=test.steward.jradoo.com
      # API_KEY: set this to log in via "Sign in directly" (no passkey needed for test).
      # Use a secret value; omit or leave empty to disable key-based login.
      - API_KEY=${STEWARD_API_KEY:-}
      # Claude CLI is installed globally by npm install -g in the Dockerfile
      - CLAUDE_PATH=/usr/local/bin/claude
      # Long-lived OAuth token generated via `claude setup-token`.
      # Independent of the host's rotating ~/.claude/.credentials.json, so
      # running the container cannot invalidate the host's session — even
      # though it's the same Claude account.
      - CLAUDE_CODE_OAUTH_TOKEN=${STEWARD_TEST_OAUTH_TOKEN:-}
      # Explicitly absent: ANTHROPIC_API_KEY (entrypoint also unsets it)

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/meta"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  steward-data:
    driver: local
