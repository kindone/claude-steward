# app{1-10}.steward.jradoo.com → ports 4001-4010
# Uses wildcard cert (steward.jradoo.com). Add/remove by symlinking to sites-enabled.
# Reverse: sudo rm /etc/nginx/sites-enabled/steward-apps && sudo nginx -s reload

map $host $app_port {
    ~^app(?<n>[1-9]|10)\.steward\.jradoo\.com$ 400$n;
}

server {
    server_name ~^app([1-9]|10)\.steward\.jradoo\.com$;
    listen 443 ssl;

    ssl_certificate     /etc/letsencrypt/live/steward.jradoo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/steward.jradoo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:$app_port;
        proxy_http_version 1.1;

        # WebSocket (MkDocs live-reload, Vite HMR, etc.)
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name ~^app([1-9]|10)\.steward\.jradoo\.com$;
    return 301 https://$host$request_uri;
}
